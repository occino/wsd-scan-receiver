services:
  wsd-scan-receiver:
    build: .
    container_name: wsd-scan-receiver
    hostname: "${WSD_HOSTNAME:-paperless-wsd}"
    user: "${PUID:-1000}:${PGID:-1000}"

    # WS-Discovery uses UDP multicast on 239.255.255.250:3702. Host networking
    # gives scanners on the LAN the best chance of seeing this receiver.
    network_mode: host

    environment:
      WSD_DEVICE_NAME: "${WSD_DEVICE_NAME:-Paperless}"
      WSD_UUID: "${WSD_UUID:-}"
      WSD_HTTP_PORT: "${WSD_HTTP_PORT:-5357}"
      OUTPUT_DIR: "/consume"
      # Optional: set this if automatic XAddr host IP detection picks the wrong
      # interface on a multi-homed host.
      WSD_HOST: "${WSD_HOST:-}"
      # Optional: set this to the LAN interface used for IPv6 WS-Discovery.
      WSD_INTERFACE: "${WSD_INTERFACE:-}"
      # Experimental: actively probe WSD scan devices and subscribe for
      # ScanAvailableEvent notifications.
      WSD_SUBSCRIBE_ENABLED: "${WSD_SUBSCRIBE_ENABLED:-false}"
      WSD_SUBSCRIBE_INTERVAL_SECONDS: "${WSD_SUBSCRIBE_INTERVAL_SECONDS:-60}"
      # Optional: scanner IP for directed WSD discovery when multicast
      # discovery is unreliable. This still uses WSD/DPWS only.
      WSD_SCANNER_IP: "${WSD_SCANNER_IP:-}"
      MAX_POST_BYTES: "${MAX_POST_BYTES:-104857600}"
      SCAN_FORMAT: "${SCAN_FORMAT:-exif}"
      SCAN_INPUT_SOURCE: "${SCAN_INPUT_SOURCE:-Auto}"
      SCAN_CONTENT_TYPE: "${SCAN_CONTENT_TYPE:-Text}"
      SCAN_COLOR_PROCESSING: "${SCAN_COLOR_PROCESSING:-RGB24}"
      SCAN_RESOLUTION: "${SCAN_RESOLUTION:-100}"
      SCAN_COMPRESSION_QUALITY: "${SCAN_COMPRESSION_QUALITY:-50}"
      SCAN_IMAGES_TO_TRANSFER: "${SCAN_IMAGES_TO_TRANSFER:-1}"
      SCAN_WIDTH: "${SCAN_WIDTH:-8500}"
      SCAN_HEIGHT: "${SCAN_HEIGHT:-11700}"
      SCAN_REGION_X: "${SCAN_REGION_X:-0}"
      SCAN_REGION_Y: "${SCAN_REGION_Y:-0}"
      SCAN_REGION_WIDTH: "${SCAN_REGION_WIDTH:-8500}"
      SCAN_REGION_HEIGHT: "${SCAN_REGION_HEIGHT:-11700}"
      SCAN_BRIGHTNESS: "${SCAN_BRIGHTNESS:-0}"
      SCAN_CONTRAST: "${SCAN_CONTRAST:-0}"
      SCAN_SHARPNESS: "${SCAN_SHARPNESS:-0}"
      SCAN_ROTATION: "${SCAN_ROTATION:-0}"
      SCAN_SCALING_WIDTH: "${SCAN_SCALING_WIDTH:-100}"
      SCAN_SCALING_HEIGHT: "${SCAN_SCALING_HEIGHT:-100}"
      DEBUG: "${WSD_DEBUG:-false}"
      RAW_DUMP_DIR: "/debug-dumps"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

    volumes:
      # Point this at your Paperless-ngx consume directory if desired.
      - ${CONSUME_DIR:-./consume}:/consume
      - ${DEBUG_DUMPS_DIR:-./debug-dumps}:/debug-dumps
      # Persists the generated endpoint UUID across container restarts.
      - ${DATA_DIR:-./data}:/data

    restart: unless-stopped
