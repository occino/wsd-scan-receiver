services:
  wsd-scan-receiver:
    build: .
    container_name: wsd-scan-receiver
    hostname: "${WSD_HOSTNAME:-paperless-wsd}"
    user: "${PUID:-1000}:${PGID:-1000}"

    # WS-Discovery uses UDP multicast on 239.255.255.250:3702. Host networking
    # gives scanners on the LAN the best chance of seeing this receiver.
    network_mode: host

    environment:
      WSD_DEVICE_NAME: "${WSD_DEVICE_NAME:-Paperless}"
      WSD_UUID: "${WSD_UUID:-}"
      WSD_HTTP_PORT: "${WSD_HTTP_PORT:-5357}"
      OUTPUT_DIR: "/scans"
      ORIGINAL_DIR: "/original"
      # Optional: set this if automatic XAddr host IP detection picks the wrong
      # interface on a multi-homed host.
      WSD_HOST: "${WSD_HOST:-}"
      # Optional: set this to the LAN interface used for IPv6 WS-Discovery.
      WSD_INTERFACE: "${WSD_INTERFACE:-}"
      # Experimental: actively probe WSD scan devices and subscribe for
      # ScanAvailableEvent notifications.
      WSD_SUBSCRIBE_ENABLED: "${WSD_SUBSCRIBE_ENABLED:-false}"
      WSD_SUBSCRIBE_INTERVAL_SECONDS: "${WSD_SUBSCRIBE_INTERVAL_SECONDS:-60}"
      # Optional: scanner IP for directed WSD discovery when multicast
      # discovery is unreliable. This still uses WSD/DPWS only.
      WSD_SCANNER_IP: "${WSD_SCANNER_IP:-}"
      MAX_POST_BYTES: "${MAX_POST_BYTES:-104857600}"
      DEBUG: "${WSD_DEBUG:-false}"
      RAW_DUMP_DIR: "/debug-dumps"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

    volumes:
      # Host directory where received scan files are written.
      - ${SCAN_DIR:-./scans}:/scans
      # Host directory where optional original/final scan copies are written.
      - ${ORIGINAL_DIR:-./original}:/original
      - ${DEBUG_DUMPS_DIR:-./debug-dumps}:/debug-dumps
      # Persists the generated endpoint UUID, subscription state, and scan config.
      - ${DATA_DIR:-./data}:/data

    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.wsd-scan-receiver-router.rule=Host(`wsd-scan-receiver.homelab.lan`)
      - traefik.http.routers.wsd-scan-receiver-router.tls=true
      - traefik.http.routers.wsd-scan-receiver-router.entrypoints=websecure
      - traefik.http.routers.wsd-scan-receiver-router.tls.certresolver=myresolver
      - traefik.http.routers.wsd-scan-receiver-router.service=wsd-scan-receiver-srv
      - traefik.http.services.wsd-scan-receiver-srv.loadbalancer.server.port=8888
      - traefik.http.services.wsd-scan-receiver-srv.loadbalancer.server.scheme=http
      - com.centurylinklabs.watchtower.enable=true
